name: Sync Feishu Data

on:
  schedule:
    # 每天上午 9:00 (UTC+8 = 01:00 UTC)
    - cron: '0 1 * * *'
    # 每天中午 12:00 (UTC+8 = 04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Feishu Data
        run: |
          cat > sync.js << 'EOF'
          const https = require('https');
          
          // 飞书 API 配置
          const APP_ID = process.env.FEISHU_APP_ID;
          const APP_SECRET = process.env.FEISHU_APP_SECRET;
          const APP_TOKEN = 'U40WbqMW7a2JLOsKUoVcP676nih';
          const TABLE_ID = 'tblrlpweq7BAOJkz';
          
          async function getTenantAccessToken() {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({ app_id: APP_ID, app_secret: APP_SECRET });
              const options = {
                hostname: 'open.feishu.cn',
                path: '/open-apis/auth/v3/tenant_access_token/internal',
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': data.length }
              };
              const req = https.request(options, res => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => resolve(JSON.parse(body).tenant_access_token));
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }
          
          async function getRecords(token) {
            const allRecords = [];
            let page_token = '';
            
            do {
              const params = page_token ? `?page_token=${page_token}&page_size=500` : '?page_size=500';
              const data = await new Promise((resolve, reject) => {
                const options = {
                  hostname: 'open.feishu.cn',
                  path: `/open-apis/bitable/v1/apps/${APP_TOKEN}/tables/${TABLE_ID}/records${params}`,
                  method: 'GET',
                  headers: { 'Authorization': `Bearer ${token}` }
                };
                const req = https.request(options, res => {
                  let body = '';
                  res.on('data', chunk => body += chunk);
                  res.on('end', () => resolve(JSON.parse(body)));
                });
                req.on('error', reject);
                req.end();
              });
              if (data.data && data.data.items) {
                allRecords.push(...data.data.items);
                page_token = data.data.page_token;
              } else {
                break;
              }
            } while (page_token);
            
            return allRecords;
          }
          
          async function main() {
            try {
              console.log('Fetching tenant access token...');
              const token = await getTenantAccessToken();
              console.log('Fetching records...');
              const records = await getRecords(token);
              console.log(`Fetched ${records.length} records`);
              
              const fs = require('fs');
              fs.writeFileSync('pages/data.json', JSON.stringify({ 
                updateTime: new Date().toISOString(),
                total: records.length,
                records: records
              }, null, 2));
              console.log('Data saved to pages/data.json');
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          }
          
          main();
          EOF
          node sync.js
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Commit and Push
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add pages/data.json
          git diff --cached || { echo "No changes"; exit 0; }
          git commit -m "chore: sync feishu data $(date +'%Y-%m-%d %H:%M:%S')"
          git push