<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目列表 - 产品项目统计报表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center hover:bg-zinc-700 transition">
          <i class="fas fa-arrow-left text-white"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-gray-900">项目列表</h1>
          <p class="text-sm text-gray-500">全部 82 个项目</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" placeholder="搜索产品型号..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 w-64">
        </div>
        <select class="appearance-none border border-gray-200 px-4 py-2 rounded-lg text-sm cursor-pointer hover:bg-gray-50">
          <option value="">全部事业部</option>
          <option value="智能家居">智能家居</option>
          <option value="智能穿戴">智能穿戴</option>
          <option value="创新事业部">创新事业部</option>
          <option value="TikTok事业部">TikTok事业部</option>
          <option value="Temu事业部">Temu事业部</option>
        </select>
        <select class="appearance-none border border-gray-200 px-4 py-2 rounded-lg text-sm cursor-pointer hover:bg-gray-50">
          <option value="">全部品类</option>
          <option value="IPC">IPC</option>
          <option value="耳机">耳机</option>
          <option value="APP">APP</option>
          <option value="录音笔">录音笔</option>
          <option value="翻译器">翻译器</option>
          <option value="Tracker">Tracker</option>
          <option value="音箱">音箱</option>
        </select>
        <select class="appearance-none border border-gray-200 px-4 py-2 rounded-lg text-sm cursor-pointer hover:bg-gray-50">
          <option value="">全部状态</option>
          <option value="已交付">已交付</option>
          <option value="开发中">开发中</option>
          <option value="项目暂停">项目暂停</option>
          <option value="项目取消">项目取消</option>
          <option value="项目失败">项目失败</option>
        </select>
        <button class="flex items-center gap-2 text-gray-600 hover:text-gray-900 text-sm">
          <i class="fas fa-download"></i>
          导出
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="text-left text-sm text-gray-500 border-b border-gray-200 bg-gray-50">
              <th class="p-4 font-medium">产品型号</th>
              <th class="p-4 font-medium">品类</th>
              <th class="p-4 font-medium">细分品类</th>
              <th class="p-4 font-medium">事业部</th>
              <th class="p-4 font-medium">供应商</th>
              <th class="p-4 font-medium">开发类型</th>
              <th class="p-4 font-medium">项目经理</th>
              <th class="p-4 font-medium">项目状态</th>
              <th class="p-4 font-medium">交付状态</th>
            </tr>
          </thead>
          <tbody id="fullTableBody"></tbody>
        </table>
      </div>
      <div class="p-4 flex items-center justify-between border-t border-gray-200">
        <p class="text-sm text-gray-500">显示 <span id="showingCount">1-10</span> 共 <span id="totalCount">82</span> 条</p>
        <div class="flex items-center gap-2">
          <button class="px-3 py-1 border border-gray-200 rounded text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50">上一页</button>
          <button class="px-3 py-1 border border-gray-200 rounded text-sm hover:bg-gray-50">下一页</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const fullProjects = [
      { id: "CB184", category: "IPC", subCategory: "4G低功耗球机", bu: "智能家居", supplier: "瑞博斯", devType: "自主研发", pm: "陈俊成", status: "已交付", deliveryStatus: "延期40天交付" },
      { id: "CB104", category: "IPC", subCategory: "4G低功耗球机", bu: "创新事业部", supplier: "瑞博斯", devType: "选品", pm: "陈俊成", status: "已交付", deliveryStatus: "如期交付" },
      { id: "XC220", category: "IPC", subCategory: "4G行车记录仪", bu: "智能家居", supplier: "拓普", devType: "联合开发", pm: "陈俊成", status: "已交付", deliveryStatus: "延期15天交付" },
      { id: "DC54S", category: "IPC", subCategory: "wifi低功耗球机", bu: "智能家居", supplier: "智云", devType: "联合开发", pm: "陈俊成", status: "已交付", deliveryStatus: "如期交付" },
      { id: "QB95S", category: "IPC", subCategory: "4G低功耗卡片机", bu: "智能家居", supplier: "瑞博斯", devType: "联合开发", pm: "陈俊成", status: "已交付", deliveryStatus: "如期交付" },
      { id: "BF63S", category: "IPC", subCategory: "wifi喂鸟摄像机", bu: "智能家居", supplier: "天诺", devType: "选品", pm: "陈俊成", status: "已交付", deliveryStatus: "如期交付" },
      { id: "BB13S", category: "IPC", subCategory: "wifi鸟浴摄像机", bu: "智能家居", supplier: "达创", devType: "联合开发", pm: "陈俊成", status: "已交付", deliveryStatus: "如期交付" },
      { id: "AC48S", category: "IPC", subCategory: "wifi低功耗球机", bu: "智能家居", supplier: "瑞博斯", devType: "自主研发", pm: "谢洪洪", status: "开发中", deliveryStatus: "正常进行中" },
      { id: "TR100", category: "Tracker", subCategory: "Tracker定位器", bu: "智能穿戴", supplier: "品米", devType: "自主研发", pm: "谢洪洪", status: "已交付", deliveryStatus: "如期交付" },
      { id: "EP200", category: "耳机", subCategory: "头戴降噪耳机", bu: "智能穿戴", supplier: "大声", devType: "联合开发", pm: "谢洪洪", status: "项目暂停", deliveryStatus: "暂停中" }
    ];

    document.getElementById('fullTableBody').innerHTML = fullProjects.map(p => `
      <tr class="border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer">
        <td class="p-4 font-medium text-gray-900">${p.id}</td>
        <td class="p-4"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs">${p.category}</span></td>
        <td class="p-4 text-sm text-gray-600">${p.subCategory}</td>
        <td class="p-4 text-sm text-gray-600">${p.bu}</td>
        <td class="p-4 text-sm text-gray-600">${p.supplier}</td>
        <td class="p-4 text-sm text-gray-600">${p.devType}</td>
        <td class="p-4 text-sm text-gray-600">${p.pm}</td>
        <td class="p-4"><span class="px-2 py-1 rounded text-xs ${p.status === '已交付' ? 'bg-green-50 text-green-600' : p.status === '开发中' ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${p.status}</span></td>
        <td class="p-4 text-sm ${p.deliveryStatus.includes('延期') ? 'text-red-500 font-medium' : p.deliveryStatus.includes('暂停') ? 'text-gray-500' : 'text-green-600'}">${p.deliveryStatus}</td>
      </tr>
    `).join('');

    document.getElementById('totalCount').textContent = 82;
    document.getElementById('showingCount').textContent = `1-${fullProjects.length}`;
  </script>
</body>
</html>
