<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目经理统计 - 产品项目统计报表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center hover:bg-zinc-700 transition">
          <i class="fas fa-arrow-left text-white"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-gray-900">项目经理统计</h1>
          <p class="text-sm text-gray-500">各项目经理负责项目情况</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-user text-blue-500 text-2xl"></i>
        </div>
        <p class="text-3xl font-bold text-gray-900">2</p>
        <p class="text-sm text-gray-500 mt-1">项目经理</p>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
        <p class="text-3xl font-bold text-green-500">陈俊成</p>
        <p class="text-sm text-gray-500 mt-1">管理 65 个项目</p>
        <div class="mt-3 flex items-center justify-center gap-2">
          <span class="px-2 py-1 bg-green-50 text-green-600 rounded text-xs">55 已交付</span>
          <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs">7 进行中</span>
          <span class="px-2 py-1 bg-red-50 text-red-600 rounded text-xs">3 延期</span>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
        <p class="text-3xl font-bold text-purple-500">谢洪洪</p>
        <p class="text-sm text-gray-500 mt-1">管理 17 个项目</p>
        <div class="mt-3 flex items-center justify-center gap-2">
          <span class="px-2 py-1 bg-green-50 text-green-600 rounded text-xs">13 已交付</span>
          <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs">1 进行中</span>
          <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">1 暂停</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-gray-900 mb-4">项目经理项目分布</h3>
        <div id="pmPieChart" style="height: 300px;"></div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-gray-900 mb-4">项目状态对比</h3>
        <div id="pmBarChart" style="height: 300px;"></div>
      </div>
    </div>
  </main>

  <script>
    const pmPieChart = echarts.init(document.getElementById('pmPieChart'));
    pmPieChart.setOption({
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 12 } },
      series: [{
        type: 'pie',
        radius: ['50%', '70%'],
        center: ['40%', '50%'],
        itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
        label: { show: false },
        emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
        data: [
          { value: 65, name: '陈俊成', itemStyle: { color: '#3b82f6' } },
          { value: 17, name: '谢洪洪', itemStyle: { color: '#8b5cf6' } }
        ]
      }]
    });

    const pmBarChart = echarts.init(document.getElementById('pmBarChart'));
    pmBarChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      legend: { data: ['已交付', '进行中', '延期/暂停'], top: 0 },
      grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
      xAxis: { type: 'category', data: ['陈俊成', '谢洪洪'] },
      yAxis: { type: 'value' },
      series: [
        { name: '已交付', type: 'bar', data: [55, 13], barWidth: 25, itemStyle: { color: '#22c55e' }, stack: 'total' },
        { name: '进行中', type: 'bar', data: [7, 1], barWidth: 25, itemStyle: { color: '#3b82f6' }, stack: 'total' },
        { name: '延期/暂停', type: 'bar', data: [3, 1], barWidth: 25, itemStyle: { color: '#ef4444' }, stack: 'total' }
      ]
    });

    window.addEventListener('resize', () => {
      pmPieChart.resize();
      pmBarChart.resize();
    });
  </script>
</body>
</html>
