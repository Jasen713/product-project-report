<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品类分布 - 产品项目统计报表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center hover:bg-zinc-700 transition">
          <i class="fas fa-arrow-left text-white"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-gray-900">品类分布</h1>
          <p class="text-sm text-gray-500">按品类维度统计分析</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-8">
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-blue-500">48</p>
        <p class="text-xs text-gray-500 mt-1">IPC</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-green-500">15</p>
        <p class="text-xs text-gray-500 mt-1">耳机</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-purple-500">8</p>
        <p class="text-xs text-gray-500 mt-1">APP</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-amber-500">5</p>
        <p class="text-xs text-gray-500 mt-1">录音笔</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-red-500">3</p>
        <p class="text-xs text-gray-500 mt-1">翻译器</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-cyan-500">2</p>
        <p class="text-xs text-gray-500 mt-1">Tracker</p>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
        <p class="text-2xl font-bold text-lime-500">1</p>
        <p class="text-xs text-gray-500 mt-1">音箱</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-gray-900 mb-4">品类分布饼图</h3>
        <div id="categoryPieChart" style="height: 300px;"></div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-gray-900 mb-4">品类项目数量</h3>
        <div id="categoryBarChart" style="height: 300px;"></div>
      </div>
    </div>
  </main>

  <script>
    const categoryPieChart = echarts.init(document.getElementById('categoryPieChart'));
    categoryPieChart.setOption({
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 12 } },
      series: [{
        type: 'pie',
        radius: ['45%', '70%'],
        center: ['40%', '50%'],
        itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
        label: { show: false },
        emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
        data: [
          { value: 48, name: 'IPC', itemStyle: { color: '#3b82f6' } },
          { value: 15, name: '耳机', itemStyle: { color: '#22c55e' } },
          { value: 8, name: 'APP', itemStyle: { color: '#8b5cf6' } },
          { value: 5, name: '录音笔', itemStyle: { color: '#f59e0b' } },
          { value: 3, name: '翻译器', itemStyle: { color: '#ef4444' } },
          { value: 2, name: 'Tracker', itemStyle: { color: '#06b6d4' } },
          { value: 1, name: '音箱', itemStyle: { color: '#84cc16' } }
        ]
      }]
    });

    const categoryBarChart = echarts.init(document.getElementById('categoryBarChart'));
    categoryBarChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
      xAxis: { type: 'category', data: ['IPC', '耳机', 'APP', '录音笔', '翻译器', 'Tracker', '音箱'] },
      yAxis: { type: 'value' },
      series: [{
        type: 'bar',
        data: [48, 15, 8, 5, 3, 2, 1],
        barWidth: 30,
        itemStyle: { borderRadius: [4, 4, 0, 0], color: '#3b82f6' }
      }]
    });

    window.addEventListener('resize', () => {
      categoryPieChart.resize();
      categoryBarChart.resize();
    });
  </script>
</body>
</html>
